stages:
  - sync

variables:
  GIT_DEPTH: "0"

sync_backend_to_github:
  stage: sync
  image: debian:bookworm-slim
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends ca-certificates git openssh-client
    - rm -rf /var/lib/apt/lists/*
    - test -n "$GITHUB_BACKEND_SSH_KEY"
    - mkdir -p ~/.ssh
    - echo "$GITHUB_BACKEND_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
  script:
    - BACKEND_SHA="$(git subtree split --prefix backend "$CI_COMMIT_SHA")"
    - TARGET_REPO="${GITHUB_BACKEND_REPO:-git@github.com:mklymanin/kardi-shop-backend.git}"
    - git push "$TARGET_REPO" "${BACKEND_SHA}:main" --force
